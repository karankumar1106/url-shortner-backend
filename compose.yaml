services:
  backend:
    build: .
    container_name: url-shortener-backend
    ports:
      - "3000:3000"
    env_file:
      - .env.compose
    depends_on:
      - mongodb
      - redis

  mongodb:
    image: mongo:7
    container_name: url-shortener-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: url-shortener-redis
    ports:
      - "6379:6379"

volumes:
  mongo_data: